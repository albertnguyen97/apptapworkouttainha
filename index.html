<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đồng hồ tập tại nhà</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="timer-panel" aria-label="Đồng hồ tập luyện">
        <div class="topbar">
          <div>
            <p id="modeEyebrow" class="eyebrow">Tập tại nhà</p>
            <h1 id="modeTitle">Mông & Chân</h1>
          </div>
          <div class="session-chip">
            <span id="totalTimeLabel">15:00</span>
            <small>tổng buổi</small>
          </div>
        </div>

        <div class="phase-row">
          <span id="phaseLabel" class="phase work">Sẵn sàng</span>
          <span id="roundLabel">Vòng 1 / 1</span>
        </div>

        <div class="countdown" aria-live="polite">
          <svg class="progress-ring" viewBox="0 0 220 220" aria-hidden="true">
            <circle class="track" cx="110" cy="110" r="98"></circle>
            <circle id="progressCircle" class="progress" cx="110" cy="110" r="98"></circle>
          </svg>
          <div class="time-stack">
            <img id="exerciseImage" class="exercise-hero" src="assets/exercises/nang-hong.jpg" alt="Minh họa bài Nâng hông">
            <span id="timeLeft">00:30</span>
            <strong id="currentExercise">Nâng hông</strong>
            <small id="nextExercise">Tiếp theo: Chùng chân</small>
          </div>
        </div>

        <div class="controls" aria-label="Điều khiển đồng hồ">
          <button id="prevBtn" class="icon-btn" type="button" title="Bài trước">‹</button>
          <button id="startPauseBtn" class="primary-btn" type="button">Bắt đầu</button>
          <button id="nextBtn" class="icon-btn" type="button" title="Bài tiếp">›</button>
          <button id="resetBtn" class="secondary-btn" type="button">Reset</button>
        </div>

        <div class="timeline">
          <div class="timeline-fill" id="timelineFill"></div>
        </div>
        <p id="sessionSummary" class="summary">6 bài tập, vừa đủ 15 phút.</p>
      </section>

      <aside class="settings" aria-label="Tùy chỉnh buổi tập">
        <div class="mode-switch" aria-label="Chọn màn tập">
          <button id="workoutModeBtn" class="mode-btn active" type="button">Mông & Chân</button>
          <button id="pelvicModeBtn" class="mode-btn" type="button">Cơ sàn chậu</button>
        </div>

        <div class="settings-header">
          <h2 id="settingsTitle">Tùy chỉnh</h2>
          <button id="addExerciseBtn" class="secondary-btn compact" type="button">+ Bài tập</button>
        </div>

        <div id="workoutSettings" class="settings-section">
          <div class="grid-settings">
            <label>
              Tập
              <input id="workSeconds" type="number" min="5" max="300" step="5" value="30">
              <span>giây</span>
            </label>
            <label>
              Nghỉ
              <input id="restSeconds" type="number" min="0" max="180" step="5" value="15">
              <span>giây</span>
            </label>
            <label>
              Tổng
              <input id="totalMinutes" type="number" min="1" max="120" step="1" value="15">
              <span>phút</span>
            </label>
          </div>

          <div class="exercise-list" id="exerciseList"></div>
        </div>

        <div id="pelvicSettings" class="settings-section hidden">
          <div class="pelvic-list" id="pelvicList"></div>
        </div>

        <div class="preset-actions">
          <button id="restoreBtn" class="secondary-btn" type="button">Khôi phục bài mặc định</button>
          <button id="applyBtn" class="primary-btn small" type="button">Áp dụng</button>
        </div>
      </aside>
    </main>

    <template id="pelvicTemplate">
      <div class="pelvic-item">
        <input class="pelvic-name" type="text" aria-label="Tên bài tập">
        <label>
          Siết
          <input class="pelvic-squeeze" type="number" min="1" max="30" step="1">
          <span>giây</span>
        </label>
        <label>
          Thả
          <input class="pelvic-release" type="number" min="1" max="30" step="1">
          <span>giây</span>
        </label>
        <label>
          Lặp
          <input class="pelvic-reps" type="number" min="1" max="200" step="1">
          <span>lần</span>
        </label>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
